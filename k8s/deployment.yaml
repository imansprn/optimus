apiVersion: v1
kind: ConfigMap
metadata:
  name: optimus-config
data:
  config.yaml: |
    upstream_host: "pricing.primexm.com"
    upstream_port: 9879
    listen_addr: "0.0.0.0:9878"
    log_level: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimus-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: optimus-gateway
  template:
    metadata:
      labels:
        app: optimus-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
      - name: gateway
        image: optimus-gateway:latest
        ports:
        - containerPort: 9878
          name: fix
        - containerPort: 9090
          name: metrics
        env:
        - name: optimus_UPSTREAM_USER
          valueFrom:
            secretKeyRef:
              name: primexm-credentials
              key: username
        - name: optimus_UPSTREAM_PASS
          valueFrom:
            secretKeyRef:
              name: primexm-credentials
              key: password
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.yaml
          subPath: config.yaml
      volumes:
      - name: config-volume
        configMap:
          name: optimus-config
---
apiVersion: v1
kind: Service
metadata:
  name: optimus-gateway
spec:
  selector:
    app: optimus-gateway
  ports:
  - name: fix
    protocol: TCP
    port: 9878
    targetPort: 9878
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: 9090
  type: LoadBalancer
